name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      plugin_release_created: ${{ steps.release.outputs.euroscope-plugin--release_created }}
      plugin_tag: ${{ steps.release.outputs.euroscope-plugin--tag_name }}
      plugin_version: ${{ steps.release.outputs.euroscope-plugin--version }}
      backend_release_created: ${{ steps.release.outputs.backend--release_created }}
      backend_tag: ${{ steps.release.outputs.backend--tag_name }}
      backend_version: ${{ steps.release.outputs.backend--version }}
      frontend_release_created: ${{ steps.release.outputs.frontend--release_created }}
      frontend_tag: ${{ steps.release.outputs.frontend--tag_name }}
      frontend_version: ${{ steps.release.outputs.frontend--version }}
      frontend_body: ${{ steps.release.outputs.frontend--body }}
      frontend_html_url: ${{ steps.release.outputs.frontend--html_url }}
      docs_release_created: ${{ steps.release.outputs.docs--release_created }}
      docs_tag: ${{ steps.release.outputs.docs--tag_name }}
      docs_version: ${{ steps.release.outputs.docs--version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-plugin:
    needs: release-please
    if: needs.release-please.outputs.plugin_release_created == 'true'
    runs-on: blacksmith-4vcpu-windows-2025
    defaults:
      run:
        working-directory: ./euroscope-plugin
    steps:
      - uses: actions/checkout@v3

      - name: Set up Visual Studio Shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x86

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Run CMake
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -G Ninja -Bbuild

      - name: Run Ninja Build
        working-directory: ./euroscope-plugin/build
        run: ninja

      - name: Set prerelease flag
        id: set_prerelease
        shell: bash
        run: |
          version="${{ needs.release-please.outputs.plugin_version }}"
          if [[ "$version" == *"-"* || $(echo "$version < 1" | bc 2>/dev/null || echo 0) -eq 1 ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.plugin_tag }}
          name: FlightStripsPlugin ${{ needs.release-please.outputs.plugin_tag }}
          files: |
            ./euroscope-plugin/build/bin/FlightStripsPlugin.dll
            ./euroscope-plugin/build/bin/FlightStripsPluginCore.dll
            ./euroscope-plugin/build/bin/flightstrips_config.ini
            ./euroscope-plugin/build/bin/flightstrips_config_dev.ini
          prerelease: ${{ steps.set_prerelease.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-backend:
    needs: release-please
    if: needs.release-please.outputs.backend_release_created == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend-api:${{ needs.release-please.outputs.backend_version }}
            ghcr.io/${{ github.repository_owner }}/backend-api:latest

      - name: Build and push migrate image
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./backend
          file: ./backend/Dockerfile.Migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend-migrate:${{ needs.release-please.outputs.backend_version }}
            ghcr.io/${{ github.repository_owner }}/backend-migrate:latest

  build-frontend:
    needs: release-please
    if: needs.release-please.outputs.frontend_release_created == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:${{ needs.release-please.outputs.frontend_version }}
            ghcr.io/${{ github.repository_owner }}/frontend:latest

  announce-frontend:
    needs: [release-please, build-frontend]
    if: needs.build-frontend.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Post Discord announcement
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ needs.release-please.outputs.frontend_tag }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.frontend_version }}
          RELEASE_BODY: ${{ needs.release-please.outputs.frontend_body }}
          RELEASE_URL: ${{ needs.release-please.outputs.frontend_html_url }}
        with:
          script: |
            const tag     = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const body    = (process.env.RELEASE_BODY || '').trim();
            const url     = process.env.RELEASE_URL
                              || `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            // ── Prefix → plain English ─────────────────────────────────────
            const PREFIX_MAP = {
              'feat':     '✨ New',
              'feature':  '✨ New',
              'fix':      '🐛 Fixed',
              'bugfix':   '🐛 Fixed',
              'hotfix':   '🐛 Fixed',
              'core':     '⚙️ Improved',
              'perf':     '⚡ Faster',
              'refactor': '🔧 Refactored',
              'style':    '🎨 Styled',
              'ui':       '🎨 UI',
              'chore':    '🧹 Maintenance',
              'docs':     '📝 Docs',
              'test':     '🧪 Tests',
              'revert':   '↩️ Reverted',
              'security': '🔒 Security',
              'build':    '📦 Build',
              'ci':       '🤖 CI',
            };

            function translateLine(line) {
              const match = line.match(/^([a-zA-Z]+)(?:\([^)]+\))?[!:][\s]+(.+)/);
              if (!match) return null;
              const [, type, msg] = match;
              const label = PREFIX_MAP[type.toLowerCase()];
              if (!label) return null;
              const clean = msg.charAt(0).toUpperCase() + msg.slice(1).replace(/\.?\s*$/, '');
              return `- ${label}: ${clean}`;
            }

            // ── Parse release body into bullets ────────────────────────────
            let bullets = [];
            if (body) {
              for (const raw of body.split('\n')) {
                const line = raw.trim().replace(/^[-*]\s*/, '');
                if (!line || line.startsWith('#')) continue;
                const translated = translateLine(line);
                bullets.push(translated || `- ${line.charAt(0).toUpperCase() + line.slice(1)}`);
              }
            }
            if (bullets.length === 0) bullets.push('- See full release notes for details.');

            // ── Build message ──────────────────────────────────────────────
            const message = [
              `**🚀 Frontend v${version}**`,
              '',
              "**What's new:**",
              ...bullets.slice(0, 8),
              '',
              `📦 Full release notes: <${url}>`,
            ].join('\n');

            core.info('Discord message:\n' + message);

            // ── Post to Discord ────────────────────────────────────────────
            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username:   'FlightStrips Releases',
                avatar_url: 'https://github.com/flightstrips.png',
                content:    message,
              }),
            });

            if (!res.ok) {
              const err = await res.text();
              core.setFailed(`Discord webhook error ${res.status}: ${err}`);
              return;
            }

            core.info('Successfully posted to Discord.');

  build-docs:
    needs: release-please
    if: needs.release-please.outputs.docs_release_created == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docs image
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docs:${{ needs.release-please.outputs.docs_version }}
            ghcr.io/${{ github.repository_owner }}/docs:latest

  deploy:
    needs: [build-backend, build-frontend, build-docs]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-docs.result == 'success')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v3

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
