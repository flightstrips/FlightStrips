    path: [SQ, AD, TE]
  - name: North stands to runway 12
    forRunway: "12"
    forStandRanges: *north_stands
    active: ["12"]
    path: [SQ, AD, TW]

  - name: East and South stands to runway 22R
    forRunway: 22R
    forStandRanges: &east_south_stands [G110-G137]
    active: [22R]
    path: [SQ, GE, GW, TE]
