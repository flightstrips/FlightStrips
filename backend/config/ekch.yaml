    path: [SQ, GE, AD, TE]

  - name: West stand to runway 22R
    forRunway: 22R
    forStandRanges: &west_stands [W1]
    active: [22R]
    path: [SQ, GW, TW]
  - name: West stand to runway 04L
    forRunway: 04L
    forStandRanges: *west_stands
    active: [04L]
    path: [SQ, GW, TW]
  - name: West stand to runway 04R
    forRunway: 04R
    forStandRanges: *west_stands
    active: [04R]
    path: [SQ, GW, TW]
  - name: West stand to runway 30
