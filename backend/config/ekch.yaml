    path: [SQ, GW, AD, TW]
  - name: West stand to runway 12
    forRunway: "12"
    forStandRanges: *west_stands
    active: ["12"]
    path: [SQ, GW, TW]

  # Arrival paths are selected from destination stand and arrival runway.
  - name: Runway 30 to cargo
    forStandRanges:
      - G110-G137
    active: ["30"]
    path: [TE, AA, GWA, GE]
  - name: Runway 30 to rest
    forStandRanges:
