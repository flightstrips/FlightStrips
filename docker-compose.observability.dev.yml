# Usage: docker compose -f docker-compose.observability.yml -f docker-compose.observability.dev.yml up -d
# Overrides prod compose for local development: no Auth0, Grafana accessible on localhost:3000

services:
  grafana:
    ports:
      - "3000:3000"
    environment:
      GRAFANA_ROOT_URL: http://localhost:3000
      GRAFANA_DOMAIN: localhost
      AUTH0_DOMAIN: ""
      AUTH0_GRAFANA_CLIENT_ID: ""
      AUTH0_GRAFANA_CLIENT_SECRET: ""
    volumes:
      - ./observability/grafana/grafana.dev.ini:/etc/grafana/grafana.ini:ro

networks:
  flightstrips:
    external: true
    name: flightstrips
