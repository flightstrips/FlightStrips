services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - observability
      - flightstrips
    depends_on:
      - tempo
      - loki
      - prometheus

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - observability

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.3.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GRAFANA_ROOT_URL: ${GRAFANA_ROOT_URL}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
      GF_SECURITY_SECRET_KEY: ${GF_SECURITY_SECRET_KEY}
      GF_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_GRAFANA_CLIENT_ID: ${AUTH0_GRAFANA_CLIENT_ID}
      AUTH0_GRAFANA_CLIENT_SECRET: ${AUTH0_GRAFANA_CLIENT_SECRET}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
      - flightstrips
    depends_on:
      - tempo
      - loki
      - prometheus

networks:
  observability:
    name: observability
  flightstrips:
    external: true
    name: flightstrips

volumes:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
