services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  migrator:
    image: ghcr.io/flightstrips/backend-migrate:latest
    restart: on-failure
    environment:
      DATABASE_CONNECTIONSTRING: ${DATABASE_CONNECTIONSTRING}
    depends_on:
      postgres:
        condition: service_started
    networks:
      - backend
    command: /app/bin/migrate --dsn "${DATABASE_CONNECTIONSTRING}" --migrations /app/migrations

  backend:
    image: ghcr.io/flightstrips/backend-api:latest
    restart: unless-stopped
    mem_limit: 2g
    environment:
      DATABASE_CONNECTIONSTRING: ${DATABASE_CONNECTIONSTRING}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      OIDC_SIGNING_ALGO: ${OIDC_SIGNING_ALGO}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE}
      CDM_KEY: ${CDM_KEY:-}
      HOPPIE_LOGON: ${HOPPIE_LOGON:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_ADDR: "0.0.0.0:80"
      ENVIRONMENT: production
      # Keep SAT release-safe. Enable only after /healthz reports
      # stand_assignment.status=ready; rollback by restoring false and restarting.
      ENABLE_STAND_ASSIGNMENT: ${ENABLE_STAND_ASSIGNMENT:-false}
      # Local-only synthetic data console. The backend also refuses to start
      # if this is enabled while ENVIRONMENT is production.
      ENABLE_TEST_TOOLS: "false"
      # Release EFB code disabled until the authenticated pilot surface is ready.
      ENABLE_EFB: ${ENABLE_EFB:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
    depends_on:
      postgres:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    networks:
      - backend
      - flightstrips

  frontend:
    image: ghcr.io/flightstrips/frontend:latest
    restart: unless-stopped
    environment:
      APP_VERSION: ${APP_VERSION:-}
      WS_URL: ${WS_URL}
      OIDC_FRONTEND_CLIENT_ID: ${OIDC_FRONTEND_CLIENT_ID}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE}
      OIDC_CONNECTION: ${OIDC_CONNECTION}
    depends_on:
      - backend
    networks:
      - flightstrips

  docs:
    image: ghcr.io/flightstrips/docs:latest
    restart: unless-stopped
    networks:
      - flightstrips

networks:
  backend:
  flightstrips:
    external: true
    name: flightstrips

volumes:
  postgres_data:
