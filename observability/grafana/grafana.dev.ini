[server]
root_url = http://localhost:3000
domain = localhost

[database]
type = sqlite3

[security]
secret_key = ${GF_SECURITY_SECRET_KEY}
admin_user = ${GF_ADMIN_USER}
admin_password = ${GF_ADMIN_PASSWORD}

[auth]
disable_login_form = false

[auth.anonymous]
enabled = false

[auth.generic_oauth]
enabled = false

[paths]
provisioning = /etc/grafana/provisioning
