[server]
root_url = ${GRAFANA_ROOT_URL}
domain = ${GRAFANA_DOMAIN}

[database]
type = sqlite3

[security]
secret_key = ${GF_SECURITY_SECRET_KEY}
admin_user = ${GF_ADMIN_USER}
admin_password = ${GF_ADMIN_PASSWORD}

[auth]
disable_login_form = true

[auth.anonymous]
enabled = false

[auth.generic_oauth]
enabled = true
name = Auth0
client_id = ${AUTH0_GRAFANA_CLIENT_ID}
client_secret = ${AUTH0_GRAFANA_CLIENT_SECRET}
scopes = openid profile
auth_url = https://${AUTH0_DOMAIN}/authorize
token_url = https://${AUTH0_DOMAIN}/oauth/token
use_pkce = true
use_id_token = true
email_attribute_path = sub
login_attribute_path = nickname || sub
name_attribute_path = name || nickname || sub
allow_sign_up = true
role_attribute_path = contains("https://flightstrips.dk/roles"[*], 'grafana-user') && 'Admin'
role_attribute_strict_mode = true
auto_login = true
signout_redirect_url = https://${AUTH0_DOMAIN}/v2/logout?returnTo=${GRAFANA_ROOT_URL}

[paths]
provisioning = /etc/grafana/provisioning
